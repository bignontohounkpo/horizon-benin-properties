<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO -->
    <title>Agence Immobilière Cotonou | Location & Vente au Bénin</title>

    <meta
      name="description"
      content="Agence immobilière à Cotonou : appartements meublés, villas et terrains à louer ou acheter au Bénin. +250 biens vérifiés, accompagnement complet. Contactez-nous gratuitement."

    <meta
      name="keywords"
      content="agence immobilière Cotonou, appartement à louer Cotonou, villa à louer Bénin, terrain à vendre Cotonou, location appartement meublé Cotonou, immobilier Bénin, maison à louer Cotonou, achat immobilier Bénin, service de nettoyage"
    />

    <meta name="author" content="Janice Groupe International" />
    <meta name="robots" content="index, follow" />

    <meta name="geo.placename" content="Cotonou, Bénin" />
    <meta name="geo.position" content="6.3654;2.4183" />

    <!-- Canonical -->
    <link rel="canonical" href="https://votreagence.com/" />

    <link rel="icon" type="image/png" href="/logo.webp" />

    <meta property="og:type" content="website" />

        "latitude": "6.3654",

    <meta name="theme-color" content="#1A5276" />
